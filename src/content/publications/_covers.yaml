# Cover image metadata for publications.
# Managed via Decap CMS → Publications → Journal Covers.
#
# Each entry links a BibTeX citation key to its journal cover images.
# The key must exactly match the key in public/bib/pubs.bib.
# These fields are merged into the generated YAML by scripts/bib-to-yaml.mjs.

covers:
  - key: Goldberga2019
    coverImage: /img/covers/Chow2018.jpg
    coverThumb: /img/covers/thumbs/Chow2018.jpg
  - key: Chow2020
    coverImage: /img/covers/Chow2020.jpg
    coverThumb: /img/covers/thumbs/Chow2020.jpg
