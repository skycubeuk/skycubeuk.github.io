key: Chow2015
title: Hydroxyproline Ring Pucker Causes Frustration of Helix Parameters in the Collagen Triple Helix
authors: Wing Y. Chow, Dominique Bihan, Chris J. Forman, David A. Slatter, David G. Reid, David J. Wales, Richard W. Farndale, Melinda J. Duer
journal: Scientific Reports
year: 2015
doi: 10.1038/srep12556
url: http://www.nature.com/articles/srep12556
abstract: Collagens, the most abundant proteins in mammals, are defined by their triple-helical structures and distinctive Gly-Xaa-Yaa repeating sequence, where Xaa is often proline and Yaa, hydroxyproline (Hyp/O). It is known that hydroxyproline in the Yaa position stabilises the triple helix, and that lack of proline hydroxylation in vivo leads to dysfunctional collagen extracellular matrix assembly, due to a range of factors such as a change in hydration properties. In addition, we note that in model peptides, when Yaa is unmodified proline, the Xaa proline has a strong propensity to adopt an endo ring conformation, whilst when Yaa is hydroxyproline, the Xaa proline adopts a range of endo and exo conformations. Here we use a combination of solid-state NMR spectroscopy and potential energy landscape modelling of synthetic triple-helical collagen peptides to understand this effect. We show that hydroxylation of the Yaa proline causes the Xaa proline ring conformation to become metastable, which in turn confers flexibility on the triple helix.
volume: "5"
pages: "12556"
