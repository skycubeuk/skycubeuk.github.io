key: Chow2020
title: Pigmentation Chemistry and Radical-Based Collagen Degradation in Alkaptonuria and Osteoarthritic Cartilage
authors: Wing Ying Chow, Brendan P Norman, Norman B Roberts, Lakshminarayan R Ranganath, Christian Teutloff, Robert Bittl, Melinda J Duer, James A Gallagher, Hartmut Oschkinat
journal: Angewandte Chemie - International Edition
year: "2020"
doi: 10.1002/anie.202000618
url: https://onlinelibrary.wiley.com/doi/abs/10.1002/anie.202000618
abstract: "Alkaptonuria (AKU) is a rare disease characterized by high levels of homogentisic acid (HGA); patients suffer from tissue ochronosis: dark brown pigmentation, especially of joint cartilage, leading to severe early osteoarthropathy. No molecular mechanism links elevated HGA to ochronosis; the pigment's chemical identity is still not known, nor how it induces joint cartilage degradation. Here we give key insight on HGA-derived pigment composition and collagen disruption in AKU cartilage. Synthetic pigment and pigmented human cartilage tissue both showed hydroquinone-resembling NMR signals. EPR spectroscopy showed that the synthetic pigment contains radicals. Moreover, we observed intrastrand disruption of collagen triple helix in pigmented AKU human cartilage, and in cartilage from patients with osteoarthritis. We propose that collagen degradation can occur via transient glycyl radicals, the formation of which is enhanced in AKU due to the redox environment generated by pigmentation."
volume: "59"
pages: 11937–11942
