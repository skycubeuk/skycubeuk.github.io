title: "Pigmentation Chemistry and Radical-Based Collagen Degradation in Alkaptonuria and Osteoarthritic Cartilage"
authors: "Wing Ying Chow, Brendan Norman, Neil D. Broom, Iain D. Campbell, Melinda J. Duer, Hartmut Oschkinat, Sabine Hediger, Gaël de Paëpe"
journal: "Angewandte Chemie International Edition"
year: 2020
doi: "10.1002/anie.202015215"
abstract: "Alkaptonuria (AKU) is a rare inborn metabolic error in which homogentisic acid (HGA) accumulates and undergoes autoxidation to form a dark pigment that deposits in connective tissues. We characterise the chemical nature of this pigment and reveal the radical-based mechanism of collagen degradation."
